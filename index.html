<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFBPA Greater Houston - Executive Dashboard 2026</title>
    
    <!-- React, ReactDOM, Babel, Recharts CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        #root {
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header-left h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: white;
        }
        
        .header-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 13px;
            color: white;
        }
        
        .sync-status.synced {
            background: #10b981;
        }
        
        .sync-status.syncing {
            background: #f59e0b;
        }
        
        .sync-status.error {
            background: #ef4444;
        }
        
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }
        
        .tab.active {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 10px 10px 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }
        
        .filter-select {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 12px;
            border-left: 4px solid #2563eb;
            transition: all 0.3s;
        }
        
        .kpi-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        
        .kpi-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 8px;
        }
        
        .kpi-subtext {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .kpi-progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }
        
        .kpi-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.5s ease;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chart-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }
        
        .data-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        .table-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-success {
            background: #10b981;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn-danger {
            background: #ef4444;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: rgba(255, 255, 255, 0.05);
        }
        
        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
        }
        
        tbody tr {
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }
        
        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .status-in-progress {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        
        .status-pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        .status-negotiating {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
        }
        
        .status-committed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .board-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 12px;
            border-left: 4px solid #2563eb;
            transition: all 0.3s;
        }
        
        .board-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        
        .board-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }
        
        .board-role {
            font-size: 14px;
            color: #60a5fa;
            margin-bottom: 8px;
        }
        
        .board-note {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: white;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .alert-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .empty-state-text {
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            
            .board-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;
 
        // Configuration
        const CONFIG = {
            APPS_SCRIPT_URL: 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE',
            AUTO_SYNC_INTERVAL: 300000, // 5 minutes
            NOTIFICATION_EMAIL: 'gethorio.davidson@example.com'
        };
 
        const Dashboard = () => {
            // State Management
            const [activeTab, setActiveTab] = useState('overview');
            const [syncStatus, setSyncStatus] = useState('synced');
            const [lastSync, setLastSync] = useState(new Date());
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('');
            const [editingItem, setEditingItem] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [alert, setAlert] = useState(null);
            
            // Data State
            const [tasks, setTasks] = useState([]);
            const [sponsors, setSponsors] = useState([
                { id: 1, name: 'Care Solace', amount: 10000, status: 'Negotiating', contact: 'TBD', notes: '$10K Diamond Sponsor' },
                { id: 2, name: 'Cigna', amount: 7500, status: 'Pending', contact: 'TBD', notes: '$7.5K Platinum Sponsor' },
                { id: 3, name: 'Infrastructure Engineering Inc', amount: 5000, status: 'Committed', contact: 'Confirmed', notes: '$5K Gold Sponsor' },
                { id: 4, name: 'Dine & Dialogue', amount: 2500, status: 'Pending', contact: 'TBD', notes: '$2.5K Silver Sponsor' },
            ]);
            const [loading, setLoading] = useState(false);
 
            // Board Members
            const boardMembers = [
                { name: "Cherrelle J. Duncan", role: "President", note: "Also VP Council of Presidents National", email: "president@nfbpahoustontx.org" },
                { name: "Dr. Ericka Brown", role: "1st Vice President", note: "", email: "1stvp@nfbpahoustontx.org" },
                { name: "Gethorio Davidson", role: "2nd Vice President Programs", note: "Largest budget line item", email: "2ndvp@nfbpahoustontx.org" },
                { name: "Danita Collins", role: "Treasurer", note: "", email: "treasurer@nfbpahoustontx.org" },
                { name: "Danny Norris", role: "Parliamentarian", note: "", email: "parliamentarian@nfbpahoustontx.org" },
                { name: "Rachel Gutierrez", role: "Secretary", note: "", email: "secretary@nfbpahoustontx.org" },
                { name: "Deja Evans", role: "Assistant Secretary", note: "", email: "asst.secretary@nfbpahoustontx.org" },
                { name: "Simone Wilson", role: "Advisor", note: "", email: "advisor@nfbpahoustontx.org" },
                { name: "Brandon Denton", role: "Immediate Past President", note: "", email: "pastpresident@nfbpahoustontx.org" },
                { name: "Dr. Kimberly Henderson", role: "Board Member At Large", note: "", email: "board1@nfbpahoustontx.org" },
                { name: "Courtney Cunningham", role: "Board Member At Large", note: "", email: "board2@nfbpahoustontx.org" }
            ];
 
            // Revenue Data
            const revenueData = [
                { channel: 'Membership', target: 42000, actual: 8500, percentage: 20.2 },
                { channel: 'Sponsorship', target: 30000, actual: 7500, percentage: 25.0 },
                { channel: 'Events', target: 15000, actual: 1387, percentage: 9.2 },
                { channel: 'Grants', target: 10000, actual: 0, percentage: 0 },
            ];
 
            // Computed Values
            const totalTarget = useMemo(() => revenueData.reduce((sum, item) => sum + item.target, 0), []);
            const totalActual = useMemo(() => revenueData.reduce((sum, item) => sum + item.actual, 0), []);
            const totalPercentage = useMemo(() => ((totalActual / totalTarget) * 100).toFixed(1), [totalActual, totalTarget]);
            const sponsorshipPipeline = useMemo(() => sponsors.reduce((sum, s) => sum + s.amount, 0), [sponsors]);
 
            // Filtered Data
            const filteredTasks = useMemo(() => {
                return tasks.filter(task => {
                    const matchesSearch = task.name?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        task.assignee?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesFilter = filterStatus === 'all' || task.status?.toLowerCase().replace(' ', '-') === filterStatus;
                    return matchesSearch && matchesFilter;
                });
            }, [tasks, searchQuery, filterStatus]);
 
            const filteredSponsors = useMemo(() => {
                return sponsors.filter(sponsor => {
                    const matchesSearch = sponsor.name?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesFilter = filterStatus === 'all' || sponsor.status?.toLowerCase() === filterStatus;
                    return matchesSearch && matchesFilter;
                });
            }, [sponsors, searchQuery, filterStatus]);
 
            // Alert Management
            const showAlert = (type, message) => {
                setAlert({ type, message });
                setTimeout(() => setAlert(null), 5000);
            };
 
            // Google Sheets Integration
            const fetchData = async () => {
                if (CONFIG.APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                    console.warn('Google Apps Script URL not configured');
                    return;
                }
                
                try {
                    setSyncStatus('syncing');
                    const response = await fetch(CONFIG.APPS_SCRIPT_URL);
                    const data = await response.json();
                    
                    if (data.tasks) setTasks(data.tasks);
                    if (data.sponsors) setSponsors(data.sponsors);
                    
                    setSyncStatus('synced');
                    setLastSync(new Date());
                    showAlert('success', 'Data synced successfully');
                } catch (error) {
                    console.error('Sync error:', error);
                    setSyncStatus('error');
                    showAlert('error', 'Failed to sync data');
                }
            };
 
            const saveToSheets = async (sheet, action, data) => {
                if (CONFIG.APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                    console.warn('Google Apps Script URL not configured - simulating save');
                    return true;
                }
                
                try {
                    setSyncStatus('syncing');
                    const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ sheet, action, data })
                    });
                    
                    const result = await response.json();
                    setSyncStatus('synced');
                    setLastSync(new Date());
                    return result.status === 'success';
                } catch (error) {
                    console.error('Save error:', error);
                    setSyncStatus('error');
                    return false;
                }
            };
 
            // CRUD Operations - Tasks
            const addTask = async (taskData) => {
                const newTask = {
                    id: Date.now(),
                    ...taskData,
                    createdAt: new Date().toISOString()
                };
                
                const success = await saveToSheets('tasks', 'add', newTask);
                if (success) {
                    setTasks([...tasks, newTask]);
                    setShowModal(false);
                    setEditingItem(null);
                    showAlert('success', 'Task added successfully');
                } else {
                    showAlert('error', 'Failed to add task');
                }
            };
 
            const updateTask = async (taskData) => {
                const success = await saveToSheets('tasks', 'update', taskData);
                if (success) {
                    setTasks(tasks.map(t => t.id === taskData.id ? taskData : t));
                    setShowModal(false);
                    setEditingItem(null);
                    showAlert('success', 'Task updated successfully');
                } else {
                    showAlert('error', 'Failed to update task');
                }
            };
 
            const deleteTask = async (taskId) => {
                if (!confirm('Are you sure you want to delete this task?')) return;
                
                const success = await saveToSheets('tasks', 'delete', { id: taskId });
                if (success) {
                    setTasks(tasks.filter(t => t.id !== taskId));
                    showAlert('success', 'Task deleted successfully');
                } else {
                    showAlert('error', 'Failed to delete task');
                }
            };
 
            // CRUD Operations - Sponsors
            const addSponsor = async (sponsorData) => {
                const newSponsor = {
                    id: Date.now(),
                    ...sponsorData,
                    createdAt: new Date().toISOString()
                };
                
                const success = await saveToSheets('sponsors', 'add', newSponsor);
                if (success) {
                    setSponsors([...sponsors, newSponsor]);
                    setShowModal(false);
                    setEditingItem(null);
                    showAlert('success', 'Sponsor added successfully');
                } else {
                    showAlert('error', 'Failed to add sponsor');
                }
            };
 
            const updateSponsor = async (sponsorData) => {
                const success = await saveToSheets('sponsors', 'update', sponsorData);
                if (success) {
                    setSponsors(sponsors.map(s => s.id === sponsorData.id ? sponsorData : s));
                    setShowModal(false);
                    setEditingItem(null);
                    showAlert('success', 'Sponsor updated successfully');
                } else {
                    showAlert('error', 'Failed to update sponsor');
                }
            };
 
            const deleteSponsor = async (sponsorId) => {
                if (!confirm('Are you sure you want to delete this sponsor?')) return;
                
                const success = await saveToSheets('sponsors', 'delete', { id: sponsorId });
                if (success) {
                    setSponsors(sponsors.filter(s => s.id !== sponsorId));
                    showAlert('success', 'Sponsor deleted successfully');
                } else {
                    showAlert('error', 'Failed to delete sponsor');
                }
            };
 
            // Export Functions
            const exportToCSV = (data, filename) => {
                if (data.length === 0) {
                    showAlert('warning', 'No data to export');
                    return;
                }
                
                const headers = Object.keys(data[0]);
                const csvContent = [
                    headers.join(','),
                    ...data.map(row => headers.map(h => JSON.stringify(row[h] || '')).join(','))
                ].join('\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${filename}-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                showAlert('success', 'Data exported successfully');
            };
 
            // Modal Management
            const openModal = (type, item = null) => {
                setModalType(type);
                setEditingItem(item);
                setShowModal(true);
            };
 
            // Auto-sync
            useEffect(() => {
                const interval = setInterval(fetchData, CONFIG.AUTO_SYNC_INTERVAL);
                return () => clearInterval(interval);
            }, []);
 
            // Render Functions
            const renderOverview = () => (
                <>
                    <div className="kpi-grid">
                        <div className="kpi-card">
                            <div className="kpi-label">Total Revenue Target</div>
                            <div className="kpi-value">${totalTarget.toLocaleString()}</div>
                            <div className="kpi-subtext">FY 2026 Combined</div>
                            <div className="kpi-progress">
                                <div className="kpi-progress-bar" style={{width: `${totalPercentage}%`}}></div>
                            </div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Actual Revenue</div>
                            <div className="kpi-value">${totalActual.toLocaleString()}</div>
                            <div className="kpi-subtext">{totalPercentage}% of target</div>
                            <div className="kpi-progress">
                                <div className="kpi-progress-bar" style={{width: `${totalPercentage}%`}}></div>
                            </div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Sponsorship Pipeline</div>
                            <div className="kpi-value">${sponsorshipPipeline.toLocaleString()}</div>
                            <div className="kpi-subtext">{sponsors.length} prospects in pipeline</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Active Tasks</div>
                            <div className="kpi-value">{tasks.length}</div>
                            <div className="kpi-subtext">{tasks.filter(t => t.status !== 'Completed').length} in progress</div>
                        </div>
                    </div>
 
                    <div className="chart-container">
                        <div className="chart-title">
                            Revenue by Channel
                            <span className="chart-subtitle">Target vs Actual</span>
                        </div>
                        <ResponsiveContainer width="100%" height={350}>
                            <BarChart data={revenueData}>
                                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.1)" />
                                <XAxis dataKey="channel" stroke="rgba(255,255,255,0.6)" />
                                <YAxis stroke="rgba(255,255,255,0.6)" />
                                <Tooltip 
                                    contentStyle={{ background: '#1e293b', border: '1px solid rgba(255,255,255,0.2)', borderRadius: '6px' }}
                                    labelStyle={{ color: '#fff' }}
                                />
                                <Legend />
                                <Bar dataKey="target" fill="#60a5fa" name="Target" radius={[8, 8, 0, 0]} />
                                <Bar dataKey="actual" fill="#10b981" name="Actual" radius={[8, 8, 0, 0]} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
 
                    <div className="chart-container">
                        <div className="chart-title">
                            Sponsorship Pipeline Distribution
                            <span className="chart-subtitle">Total: ${sponsorshipPipeline.toLocaleString()}</span>
                        </div>
                        <ResponsiveContainer width="100%" height={350}>
                            <PieChart>
                                <Pie
                                    data={sponsors}
                                    dataKey="amount"
                                    nameKey="name"
                                    cx="50%"
                                    cy="50%"
                                    outerRadius={120}
                                    label={(entry) => `$${entry.amount.toLocaleString()}`}
                                >
                                    {sponsors.map((entry, index) => (
                                        <Cell key={index} fill={['#2563eb', '#3b82f6', '#60a5fa', '#93c5fd', '#dbeafe'][index % 5]} />
                                    ))}
                                </Pie>
                                <Tooltip 
                                    contentStyle={{ background: '#1e293b', border: '1px solid rgba(255,255,255,0.2)', borderRadius: '6px' }}
                                    formatter={(value) => `$${value.toLocaleString()}`}
                                />
                                <Legend />
                            </PieChart>
                        </ResponsiveContainer>
                    </div>
                </>
            );
 
            const renderBoard = () => (
                <>
                    <div className="controls">
                        <div style={{flex: 1}}>
                            <div style={{fontSize: '14px', color: 'rgba(255,255,255,0.6)', marginBottom: '8px'}}>
                                NFBPA Greater Houston Chapter - 2026-2027 Executive Board
                            </div>
                            <div style={{fontSize: '13px', color: 'rgba(255,255,255,0.4)'}}>
                                11 Leadership Positions | Contact: 832.395.2141 | PO Box 301092 Houston TX 77230-1092
                            </div>
                        </div>
                    </div>
                    <div className="board-grid">
                        {boardMembers.map((member, index) => (
                            <div key={index} className="board-card">
                                <div className="board-name">{member.name}</div>
                                <div className="board-role">{member.role}</div>
                                {member.note && <div className="board-note">{member.note}</div>}
                                <div style={{marginTop: '12px', fontSize: '12px', color: 'rgba(255,255,255,0.4)'}}>
                                    {member.email}
                                </div>
                            </div>
                        ))}
                    </div>
                </>
            );
 
            const renderTasks = () => (
                <>
                    <div className="controls">
                        <div className="search-box">
                            <input 
                                type="text" 
                                placeholder="Search tasks..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>
                        <select 
                            className="filter-select"
                            value={filterStatus}
                            onChange={(e) => setFilterStatus(e.target.value)}
                        >
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                        <button className="btn btn-secondary" onClick={() => exportToCSV(filteredTasks, 'tasks')}>
                            📊 Export CSV
                        </button>
                        <button className="btn btn-success" onClick={() => openModal('task')}>
                            ➕ Add Task
                        </button>
                    </div>
 
                    <div className="data-table">
                        <div className="table-header">
                            <div className="table-title">
                                Tasks & Projects ({filteredTasks.length})
                            </div>
                            <button className="btn" onClick={fetchData} disabled={loading}>
                                {loading ? <span className="loading-spinner"></span> : '🔄'} Sync
                            </button>
                        </div>
                        {filteredTasks.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">📋</div>
                                <div className="empty-state-text">
                                    {searchQuery || filterStatus !== 'all' 
                                        ? 'No tasks match your filters' 
                                        : 'No tasks yet'}
                                </div>
                                <button className="btn" onClick={() => openModal('task')}>
                                    Add Your First Task
                                </button>
                            </div>
                        ) : (
                            <table>
                                <thead>
                                    <tr>
                                        <th>Task</th>
                                        <th>Assignee</th>
                                        <th>Due Date</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredTasks.map((task) => (
                                        <tr key={task.id}>
                                            <td style={{fontWeight: 500}}>{task.name}</td>
                                            <td>{task.assignee}</td>
                                            <td>{task.dueDate}</td>
                                            <td>
                                                <span className={`status-badge status-${task.status?.toLowerCase().replace(' ', '-')}`}>
                                                    {task.status}
                                                </span>
                                            </td>
                                            <td>
                                                <div className="action-btns">
                                                    <button className="btn btn-sm btn-secondary" onClick={() => openModal('task', task)}>
                                                        ✏️ Edit
                                                    </button>
                                                    <button className="btn btn-sm btn-danger" onClick={() => deleteTask(task.id)}>
                                                        🗑️
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </>
            );
 
            const renderSponsors = () => (
                <>
                    <div className="controls">
                        <div className="search-box">
                            <input 
                                type="text" 
                                placeholder="Search sponsors..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>
                        <select 
                            className="filter-select"
                            value={filterStatus}
                            onChange={(e) => setFilterStatus(e.target.value)}
                        >
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="negotiating">Negotiating</option>
                            <option value="committed">Committed</option>
                        </select>
                        <button className="btn btn-secondary" onClick={() => exportToCSV(filteredSponsors, 'sponsors')}>
                            📊 Export CSV
                        </button>
                        <button className="btn btn-success" onClick={() => openModal('sponsor')}>
                            ➕ Add Sponsor
                        </button>
                    </div>
 
                    <div className="data-table">
                        <div className="table-header">
                            <div className="table-title">
                                Sponsorship Pipeline ({filteredSponsors.length})
                            </div>
                            <div style={{fontSize: '14px', color: 'rgba(255,255,255,0.6)'}}>
                                Total Pipeline: ${filteredSponsors.reduce((sum, s) => sum + s.amount, 0).toLocaleString()}
                            </div>
                        </div>
                        {filteredSponsors.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">💼</div>
                                <div className="empty-state-text">
                                    {searchQuery || filterStatus !== 'all' 
                                        ? 'No sponsors match your filters' 
                                        : 'No sponsors yet'}
                                </div>
                                <button className="btn" onClick={() => openModal('sponsor')}>
                                    Add Your First Sponsor
                                </button>
                            </div>
                        ) : (
                            <table>
                                <thead>
                                    <tr>
                                        <th>Sponsor</th>
                                        <th>Amount</th>
                                        <th>Contact</th>
                                        <th>Status</th>
                                        <th>Notes</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredSponsors.map((sponsor) => (
                                        <tr key={sponsor.id}>
                                            <td style={{fontWeight: 500}}>{sponsor.name}</td>
                                            <td style={{color: '#10b981', fontWeight: 600}}>
                                                ${sponsor.amount.toLocaleString()}
                                            </td>
                                            <td>{sponsor.contact}</td>
                                            <td>
                                                <span className={`status-badge status-${sponsor.status?.toLowerCase()}`}>
                                                    {sponsor.status}
                                                </span>
                                            </td>
                                            <td style={{fontSize: '13px', color: 'rgba(255,255,255,0.6)'}}>
                                                {sponsor.notes}
                                            </td>
                                            <td>
                                                <div className="action-btns">
                                                    <button className="btn btn-sm btn-secondary" onClick={() => openModal('sponsor', sponsor)}>
                                                        ✏️ Edit
                                                    </button>
                                                    <button className="btn btn-sm btn-danger" onClick={() => deleteSponsor(sponsor.id)}>
                                                        🗑️
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </>
            );
 
            const renderModal = () => {
                if (!showModal) return null;
 
                const isTask = modalType === 'task';
                const isEditing = !!editingItem;
                const title = isTask 
                    ? (isEditing ? 'Edit Task' : 'Add New Task')
                    : (isEditing ? 'Edit Sponsor' : 'Add New Sponsor');
 
                return (
                    <div className="modal" onClick={() => setShowModal(false)}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <div className="modal-title">{title}</div>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const formData = new FormData(e.target);
                                const data = Object.fromEntries(formData.entries());
                                
                                if (isTask) {
                                    if (isEditing) {
                                        updateTask({ ...editingItem, ...data });
                                    } else {
                                        addTask(data);
                                    }
                                } else {
                                    data.amount = parseFloat(data.amount);
                                    if (isEditing) {
                                        updateSponsor({ ...editingItem, ...data });
                                    } else {
                                        addSponsor(data);
                                    }
                                }
                            }}>
                                {isTask ? (
                                    <>
                                        <div className="form-group">
                                            <label className="form-label">Task Name *</label>
                                            <input 
                                                type="text" 
                                                name="name" 
                                                className="form-input" 
                                                required 
                                                defaultValue={editingItem?.name}
                                                placeholder="Enter task name"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Assignee *</label>
                                            <input 
                                                type="text" 
                                                name="assignee" 
                                                className="form-input" 
                                                required 
                                                defaultValue={editingItem?.assignee}
                                                placeholder="Enter assignee name"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Due Date *</label>
                                            <input 
                                                type="date" 
                                                name="dueDate" 
                                                className="form-input" 
                                                required 
                                                defaultValue={editingItem?.dueDate}
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Status *</label>
                                            <select 
                                                name="status" 
                                                className="form-select" 
                                                required 
                                                defaultValue={editingItem?.status || 'Pending'}
                                            >
                                                <option value="Pending">Pending</option>
                                                <option value="In Progress">In Progress</option>
                                                <option value="Completed">Completed</option>
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Description</label>
                                            <textarea 
                                                name="description" 
                                                className="form-textarea"
                                                defaultValue={editingItem?.description}
                                                placeholder="Enter task description (optional)"
                                            />
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="form-group">
                                            <label className="form-label">Sponsor Name *</label>
                                            <input 
                                                type="text" 
                                                name="name" 
                                                className="form-input" 
                                                required 
                                                defaultValue={editingItem?.name}
                                                placeholder="Enter sponsor name"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Amount ($) *</label>
                                            <input 
                                                type="number" 
                                                name="amount" 
                                                className="form-input" 
                                                required 
                                                min="0"
                                                step="0.01"
                                                defaultValue={editingItem?.amount}
                                                placeholder="Enter amount"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Contact</label>
                                            <input 
                                                type="text" 
                                                name="contact" 
                                                className="form-input"
                                                defaultValue={editingItem?.contact}
                                                placeholder="Enter contact name"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Status *</label>
                                            <select 
                                                name="status" 
                                                className="form-select" 
                                                required 
                                                defaultValue={editingItem?.status || 'Pending'}
                                            >
                                                <option value="Pending">Pending</option>
                                                <option value="Negotiating">Negotiating</option>
                                                <option value="Committed">Committed</option>
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Notes</label>
                                            <textarea 
                                                name="notes" 
                                                className="form-textarea"
                                                defaultValue={editingItem?.notes}
                                                placeholder="Enter sponsor notes (optional)"
                                            />
                                        </div>
                                    </>
                                )}
                                <div className="modal-actions">
                                    <button type="submit" className="btn btn-success">
                                        {isEditing ? '💾 Save Changes' : '➕ Add ' + (isTask ? 'Task' : 'Sponsor')}
                                    </button>
                                    <button 
                                        type="button" 
                                        className="btn btn-secondary" 
                                        onClick={() => {
                                            setShowModal(false);
                                            setEditingItem(null);
                                        }}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };
 
            return (
                <div>
                    {alert && (
                        <div className={`alert alert-${alert.type}`}>
                            {alert.type === 'success' && '✓'}
                            {alert.type === 'error' && '⚠'}
                            {alert.type === 'warning' && '⚠'}
                            {alert.message}
                        </div>
                    )}
 
                    <div className="header">
                        <div className="header-left">
                            <h1>NFBPA Greater Houston Chapter</h1>
                            <div className="header-subtitle">Executive Dashboard 2026 | EIN 59-2364093</div>
                        </div>
                        <div className="header-right">
                            <div className={`sync-status ${syncStatus}`}>
                                <span className="sync-dot"></span>
                                {syncStatus === 'synced' && `Synced ${Math.floor((new Date() - lastSync) / 60000)}m ago`}
                                {syncStatus === 'syncing' && 'Syncing...'}
                                {syncStatus === 'error' && 'Connection Error'}
                            </div>
                            <button className="btn btn-secondary" onClick={fetchData}>
                                🔄 Sync Now
                            </button>
                        </div>
                    </div>
 
                    <div className="tabs">
                        <button 
                            className={`tab ${activeTab === 'overview' ? 'active' : ''}`}
                            onClick={() => {
                                setActiveTab('overview');
                                setSearchQuery('');
                                setFilterStatus('all');
                            }}
                        >
                            📊 Overview
                        </button>
                        <button 
                            className={`tab ${activeTab === 'board' ? 'active' : ''}`}
                            onClick={() => {
                                setActiveTab('board');
                                setSearchQuery('');
                                setFilterStatus('all');
                            }}
                        >
                            👥 Board Members
                        </button>
                        <button 
                            className={`tab ${activeTab === 'tasks' ? 'active' : ''}`}
                            onClick={() => {
                                setActiveTab('tasks');
                                setSearchQuery('');
                                setFilterStatus('all');
                            }}
                        >
                            📋 Tasks ({tasks.length})
                        </button>
                        <button 
                            className={`tab ${activeTab === 'sponsors' ? 'active' : ''}`}
                            onClick={() => {
                                setActiveTab('sponsors');
                                setSearchQuery('');
                                setFilterStatus('all');
                            }}
                        >
                            💼 Sponsors ({sponsors.length})
                        </button>
                    </div>
 
                    {activeTab === 'overview' && renderOverview()}
                    {activeTab === 'board' && renderBoard()}
                    {activeTab === 'tasks' && renderTasks()}
                    {activeTab === 'sponsors' && renderSponsors()}
 
                    {renderModal()}
                </div>
            );
        };
 
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
