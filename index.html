<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFBPA 2026 Execution Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .status-active {
            color: #27ae60;
            font-weight: bold;
        }
        #loading {
            font-size: 18px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <h1>NFBPA Board Roles</h1>
    
    <div id="loading">Loading live data from Google Sheets...</div>
    
    <table id="board-roles-table" style="display: none;">
        <thead>
            <tr>
                <th>Role</th>
                <th>Name</th>
                <th>Budget</th>
                <th>Key Deliverable</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- Data will be injected here by JavaScript -->
        </tbody>
    </table>

    <script>
        // Your live Google Apps Script API endpoint
        const apiURL = "https://script.google.com/macros/s/AKfycbwM6063o9C28CNTG2OLEQA27J7MbRSrdQqBqn6IvKh58kNu57VoeIfiTHk64G60Ql5Wbw/exec";

        // Fetch the data
        fetch(apiURL)
            .then(response => response.json())
            .then(data => {
                // Hide the loading text and show the table
                document.getElementById('loading').style.display = 'none';
                document.getElementById('board-roles-table').style.display = 'table';

                const tableBody = document.getElementById('table-body');
                
                // Loop through the 'board_roles' array from your API
                data.board_roles.forEach(row => {
                    const tr = document.createElement('tr');
                    
                    // Format the budget as currency
                    const formattedBudget = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(row.Budget || 0);

                    // Create the HTML for each row
                    tr.innerHTML = `
                        <td>${row.Role || ''}</td>
                        <td><strong>${row.Name || ''}</strong></td>
                        <td>${formattedBudget}</td>
                        <td>${row['Key Deliverable'] || ''}</td>
                        <td class="${row.Status === 'Active' ? 'status-active' : ''}">${row.Status || ''}</td>
                    `;
                    
                    tableBody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('loading').innerText = 'Error loading data. Please check the console.';
            });
    </script>

</body>
</html>
