<style>
:root {
  --bg:#0a0c10; --surface:#111318; --surface2:#181c24;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --gold:#c9a84c; --gold-soft:rgba(201,168,76,0.15);
  --teal:#3ab5a0; --teal-soft:rgba(58,181,160,0.12);
  --red:#e05a5a;  --red-soft:rgba(224,90,90,0.12);
  --blue:#5a8ae0; --blue-soft:rgba(90,138,224,0.12);
  --text:#e8eaf0; --text-mid:#9aa0b0; --text-dim:#5a6070;
  --radius:10px; --radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.main{flex:1;overflow-x:hidden;padding:28px}
.logo-block{padding:24px 18px 20px;border-bottom:1px solid var(--border)}
.logo-badge{display:inline-block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:var(--gold-soft);border:1px solid rgba(201,168,76,.3);padding:3px 8px;border-radius:4px;margin-bottom:8px}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--text);line-height:1.1}
.logo-sub{font-size:10px;color:var(--text-dim);margin-top:4px}
.nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;font-weight:500;color:var(--text-mid);transition:all .15s;cursor:pointer;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:var(--gold-soft)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-section-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:14px 18px 4px}
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border)}
.org-ein{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.05em}
.org-status{font-size:10px;color:var(--teal);margin-top:2px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.04em}
.page-subtitle{font-size:12px;color:var(--text-dim);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.gold::before{background:linear-gradient(90deg,var(--gold),transparent)}
.kpi.teal::before{background:linear-gradient(90deg,var(--teal),transparent)}
.kpi.red::before{background:linear-gradient(90deg,var(--red),transparent)}
.kpi.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.02em;line-height:1}
.kpi-value.gold{color:var(--gold)} .kpi-value.teal{color:var(--teal)} .kpi-value.red{color:var(--red)} .kpi-value.blue{color:var(--blue)}
.kpi-sub{font-size:11px;color:var(--text-dim);margin-top:4px}
.progress-wrap{margin-top:8px}
.progress-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s ease}
.progress-fill.gold{background:var(--gold)} .progress-fill.teal{background:var(--teal)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.data-table td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);font-size:13px}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.badge-gold{color:var(--gold);background:var(--gold-soft);border:1px solid rgba(201,168,76,.2)}
.badge-teal{color:var(--teal);background:var(--teal-soft);border:1px solid rgba(58,181,160,.2)}
.badge-red{color:var(--red);background:var(--red-soft);border:1px solid rgba(224,90,90,.2)}
.badge-blue{color:var(--blue);background:var(--blue-soft);border:1px solid rgba(90,138,224,.2)}
.badge-dim{color:var(--text-dim);background:rgba(255,255,255,.05);border:1px solid var(--border)}
.btn-primary{background:var(--gold);color:#0a0c10;font-weight:700;font-size:12px;letter-spacing:.05em;padding:9px 18px;border-radius:8px;transition:all .15s}
.btn-primary:hover{background:#d4b05a}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text-mid);font-size:12px;font-weight:500;padding:9px 16px;border-radius:8px;border:1px solid var(--border);transition:all .15s}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn-danger{background:var(--red-soft);color:var(--red);font-size:12px;font-weight:500;padding:7px 12px;border-radius:6px;border:1px solid rgba(224,90,90,.2)}
.btn-sm{font-size:11px;padding:5px 10px;border-radius:5px;font-weight:500}
.toolbar{display:flex;gap:10px;margin-bottom:18px;align-items:center}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-size:13px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--text-dim)}
.filter-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:12px;outline:none}
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:660px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--gold)}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.alert{position:fixed;top:20px;right:20px;z-index:2000;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:slideIn .2s ease;max-width:320px}
.alert-success{background:var(--teal);color:#fff}
.alert-error{background:var(--red);color:#fff}
.alert-info{background:var(--blue);color:#fff}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);width:160px;flex-shrink:0}
.info-value{font-size:13px;color:var(--text)}
.info-value.mono{font-family:'DM Mono',monospace;font-size:12px}
.member-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px}
.member-avatar{width:38px;height:38px;border-radius:50%;background:var(--gold-soft);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);flex-shrink:0}
.member-name{font-size:13px;font-weight:600}
.member-role{font-size:11px;color:var(--text-dim);margin-top:1px}
.actual-input{background:var(--surface2);border:1px solid var(--border);color:var(--gold);padding:4px 8px;border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;width:90px;text-align:right;outline:none}
.actual-input:focus{border-color:var(--gold)}
.email-preview{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:12px;line-height:1.8;color:var(--text-mid);white-space:pre-wrap;max-height:260px;overflow-y:auto}
.loading-dots{display:inline-flex;gap:4px;align-items:center}
.loading-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
 
.tier-HOT{color:#ff6b6b;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3)}
.tier-WARM{color:#f7b731;background:rgba(247,183,49,.12);border:1px solid rgba(247,183,49,.3)}
.tier-COOL{color:#5a8ae0;background:rgba(90,138,224,.12);border:1px solid rgba(90,138,224,.3)}
.tier-COLD{color:#5a6070;background:rgba(90,96,112,.1);border:1px solid rgba(90,96,112,.2)}
.domain-Gov{color:var(--teal);background:var(--teal-soft);border:1px solid rgba(58,181,160,.2)}
.domain-Edu{color:var(--blue);background:var(--blue-soft);border:1px solid rgba(90,138,224,.2)}
.domain-Private{color:var(--gold);background:var(--gold-soft);border:1px solid rgba(201,168,76,.2)}
.domain-Personal{color:var(--text-dim);background:rgba(255,255,255,.05);border:1px solid var(--border)}
.domain-Dead{color:var(--red);background:var(--red-soft);border:1px solid rgba(224,90,90,.2)}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.pagination{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:flex-end}
.outreach-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:4px;font-size:10px;outline:none}
.recharts-tooltip-wrapper{outline:none}
</style>

const REF=new Date('2026-05-01');
const IS_GOV=/\.gov$|\.us$|cityofhouston\.net|hctx\.net|houstonpolice\.org|houstonisd\.org|bellairetx\.gov|sugarlandtx\.gov|fortbendcountytx\.gov|missouricitytx\.gov|portarthurtx\.gov/i;
const IS_DEAD=/noemail\.com/i;
const IS_PERSONAL=/yahoo|gmail|hotmail|aol|sbcglobal|msn|outlook|icloud|comcast|earthlink/i;
const IS_EDU=/\.edu$/i;
 
function scoreTier(email,expStr){
  if(IS_DEAD.test(email)) return 'COLD';
  const exp=new Date(expStr);
  const mo=(REF-exp)/(1000*60*60*24*30.4);
  const gov=IS_GOV.test(email), personal=IS_PERSONAL.test(email);
  if(mo<=18&&(gov||!personal)) return 'HOT';
  if(mo<=18) return 'WARM';
  if(mo<=36&&gov) return 'WARM';
  if(mo<=36) return 'COOL';
  if(mo<=60&&gov) return 'COOL';
  return 'COLD';
}
function domainType(email){
  if(IS_DEAD.test(email)) return 'Dead';
  if(IS_GOV.test(email)) return 'Gov';
  if(IS_EDU.test(email)) return 'Edu';
  if(IS_PERSONAL.test(email)) return 'Personal';
  return 'Private';
}

// 5. ANTHROPIC DRAFT
async function draftEmail(task, isNew) {
  const prompt = `Write a concise professional task notification email for an NFBPA Houston Chapter board member.
 
Task: ${task.title}
Assigned To: ${task.assignee} (${boardRole(task.assignee)})
Assigned By: ${task.assignedBy||'Gethorio Davidson'} (${boardRole(task.assignedBy||'Gethorio Davidson')})
Priority: ${task.priority}
Status: ${task.status}
Due Date: ${task.due||'Not specified'}
Channel: ${task.channel||'General'}
Assignment Type: ${isNew ? 'New' : 'Reassignment'}
 
Instructions: Email body only. No subject line. Address assignee by first name. Under 120 words. Reference chapter's 40th Anniversary Weekend (June 5-7, 2026) only if directly relevant. Close with "NFBPA Greater Houston Chapter."`;
 
  const res  = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:300, messages:[{role:'user',content:prompt}] })
  });
  const data = await res.json();
  const body = data.content?.find(b=>b.type==='text')?.text?.trim() || '';
  return { subject:`[NFBPA Houston] ${task.priority} Priority - ${task.title}`, body };
}

// 7. EMAIL PREVIEW MODAL
function EmailModal({ task, isNew, onClose }) {
  const [loading, setLoading] = useState(true);
  const [draft,   setDraft]   = useState(null);
  const [err,     setErr]     = useState(null);
  const [copied,  setCopied]  = useState(false);
 
  useEffect(() => {
    draftEmail(task, isNew)
      .then(d => { setDraft(d); setLoading(false); })
      .catch(() => { setErr('Draft unavailable, check API connectivity.'); setLoading(false); });
  }, []);
 
  function copy() {
    navigator.clipboard?.writeText(`Subject: ${draft.subject}\n\n${draft.body}`);
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  }
 
  const email = boardEmail(task.assignee);
  return (
    <Modal title="Task Notification Draft" onClose={onClose} lg>
      <div style={{marginBottom:14}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
          <span className="badge badge-dim">To: {task.assignee}</span>
          {email && <span className="badge badge-dim" style={{fontFamily:"'DM Mono',monospace",fontSize:9}}>{email}</span>}
          <span className={`badge ${statusColor(task.priority)}`}>{task.priority}</span>
          <span className={`badge ${statusColor(task.status)}`}>{task.status}</span>
          {task.due && <span className="badge badge-dim">Due: {task.due}</span>}
        </div>
        {draft && (
          <div style={{padding:'8px 12px',background:'var(--surface2)',borderRadius:6,borderLeft:'3px solid var(--gold)',marginBottom:12}}>
            <div style={{fontSize:9,color:'var(--text-dim)',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:3}}>Subject</div>
            <div style={{fontSize:12,color:'var(--text)',fontFamily:"'DM Mono',monospace"}}>{draft.subject}</div>
          </div>
        )}
      </div>
      {loading && (
        <div style={{textAlign:'center',padding:'40px 0'}}>
          <div className="loading-dots"><div className="loading-dot"/><div className="loading-dot"/><div className="loading-dot"/></div>
          <div style={{fontSize:11,color:'var(--text-dim)',marginTop:12}}>Drafting notification…</div>
        </div>
      )}
      {err && <div style={{color:'var(--red)',fontSize:13,padding:'20px 0'}}>{err}</div>}
      {draft && !loading && <div className="email-preview">{draft.body}</div>}
      <div className="form-actions">
        <button className="btn-ghost" onClick={onClose}>Close</button>
        {draft && <button className="btn-primary" onClick={copy}>{copied ? '✓ Copied' : '⧉ Copy Email'}</button>}
      </div>
    </Modal>
  );
}

  const [emailDlg, setEmailDlg] = useState(null);
 
  const filtered = useMemo(() => tasks.filter(t => {
    const q = search.toLowerCase();
    return (!q || t.title.toLowerCase().includes(q) || t.assignee.toLowerCase().includes(q))
      && (fStatus==='all' || t.status===fStatus)
      && (fPrio  ==='all' || t.priority===fPrio);
  }), [tasks, search, fStatus, fPrio]);
 
  function openAdd() {
    setForm({ title:'', assignee:'', assignedBy:'Gethorio Davidson', priority:'Medium', status:'Pending', due:'', channel:'' });
    setModal('add');
  }
  function openEdit(t) { setForm({...t}); setModal('edit'); }
 
  function save() {
    if (!form.title?.trim()) return showAlert('Title is required.', 'error');
    const isNew = modal === 'add';
    let saved;
 
    if (isNew) {
      saved = { ...form, id: Date.now() };
      setTasks(prev => [...prev, saved]);
    } else {
      const original = tasks.find(t => t.id === form.id);
      const assigneeChanged = original?.assignee !== form.assignee;
      saved = { ...form };
      setTasks(prev => prev.map(t => t.id === form.id ? saved : t));

// 15. RE-ENGAGEMENT PAGE
const PAGE_SIZE=50;
function MembersPage({outreach,setOutreach,showAlert}){
  const [search,setSearch]=useState('');
  const [fTier,setFTier]=useState('all');
  const [fDomain,setFDomain]=useState('all');
  const [fOutreach,setFOutreach]=useState('all');
  const [page,setPage]=useState(1);
  const [draftDlg,setDraftDlg]=useState(null);
 
  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return MEMBERS.filter(m=>{
      const os=outreach[m.id]||'Not Contacted';
      return(!q||m.name.toLowerCase().includes(q)||m.email.includes(q))
        &&(fTier==='all'||m.tier===fTier)
        &&(fDomain==='all'||m.domain===fDomain)
        &&(fOutreach==='all'||os===fOutreach);
    });
  },[search,fTier,fDomain,fOutreach,outreach]);
 
  useEffect(()=>setPage(1),[search,fTier,fDomain,fOutreach]);
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  const paged=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);
 
  const counts={HOT:0,WARM:0,COOL:0,COLD:0};
  MEMBERS.forEach(m=>counts[m.tier]=(counts[m.tier]||0)+1);
  const renewed=Object.values(outreach).filter(v=>v==='Renewed').length;
  const contacted=Object.values(outreach).filter(v=>v==='Contacted').length;
  const declined=Object.values(outreach).filter(v=>v==='Declined').length;
 
  async function draftForTier(tier){
    const members=MEMBERS.filter(m=>m.tier===tier&&m.domain!=='Dead');
    setDraftDlg({members,tier,loading:true,body:''});
    try{
      const names=members.slice(0,3).map(m=>m.name.split(',')[0].trim()).join(', ');
      const prompt=`Draft a warm professional membership re-engagement email for lapsed NFBPA Greater Houston Chapter members. Tier: ${tier} (expired ${tier==='HOT'?'within 18 months':tier==='WARM'?'18-36 months ago':'3-5 years ago'}). Sample recipients: ${names} (${members.length} total in cohort). Chapter context: 40th Anniversary Weekend June 5-7 2026, targeting 500 members. Programming calendar July-December 2026 underway. Write email body only. Use Dear [Name] salutation placeholder. Under 150 words. Highlight Anniversary Weekend milestone. Clear renewal call to action. Close: Gethorio Davidson, 2nd VP of Programs, NFBPA Greater Houston Chapter.`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
      const data=await res.json();
      const body=data.content?.find(b=>b.type==='text')?.text?.trim()||'Draft unavailable.';
      setDraftDlg(prev=>({...prev,loading:false,body}));
    }catch{setDraftDlg(prev=>({...prev,loading:false,body:'API unavailable.'}));}
  }
 
  function exportCSV(){
    const h='Name,Email,Expiry,Tier,Domain,Outreach Status';
    const rows=filtered.map(m=>`"${m.name}","${m.email}","${m.expiry}","${m.tier}","${m.domain}","${outreach[m.id]||'Not Contacted'}"`);
    const blob=new Blob([[h,...rows].join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nfbpa_suspended_members.csv';a.click();
  }
 
  return(
    <div>
      <div className="grid-5" style={{marginBottom:20}}>
        <div className="kpi red"><div className="kpi-label">🔥 HOT</div><div className="kpi-value red">{counts.HOT}</div><div className="kpi-sub">Expired ≤18mo + reachable</div></div>
        <div className="kpi gold"><div className="kpi-label">⚡ WARM</div><div className="kpi-value gold">{counts.WARM}</div><div className="kpi-sub">Expired 18-36 months</div></div>
        <div className="kpi blue"><div className="kpi-label">❄ COOL</div><div className="kpi-value blue">{counts.COOL}</div><div className="kpi-sub">Expired 3-5 years</div></div>
        <div className="kpi"><div className="kpi-label">🧊 COLD</div><div className="kpi-value" style={{color:'var(--text-dim)'}}>{counts.COLD}</div><div className="kpi-sub">5yr+ or dead email</div></div>
        <div className="kpi teal"><div className="kpi-label">✓ Renewed</div><div className="kpi-value teal">{renewed}</div><div className="kpi-sub">{contacted} contacted, {declined} declined</div></div>
      </div>
 
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <button className="btn-ghost btn-sm" style={{color:'#ff6b6b',borderColor:'rgba(255,107,107,.3)'}} onClick={()=>draftForTier('HOT')}>✉ Draft HOT ({counts.HOT})</button>
        <button className="btn-ghost btn-sm" style={{color:'#f7b731',borderColor:'rgba(247,183,49,.3)'}} onClick={()=>draftForTier('WARM')}>✉ Draft WARM ({counts.WARM})</button>
        <button className="btn-ghost btn-sm" style={{color:'var(--blue)',borderColor:'rgba(90,138,224,.3)'}} onClick={()=>draftForTier('COOL')}>✉ Draft COOL ({counts.COOL})</button>
        <div style={{flex:1}}/>
        <button className="btn-ghost btn-sm" onClick={exportCSV}>↓ Export CSV ({filtered.length})</button>
      </div>
 
      <div className="toolbar">
        <input className="search-input" placeholder="Search name or email…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="filter-select" value={fTier} onChange={e=>setFTier(e.target.value)}>
          <option value="all">All Tiers</option><option>HOT</option><option>WARM</option><option>COOL</option><option>COLD</option>
        </select>
        <select className="filter-select" value={fDomain} onChange={e=>setFDomain(e.target.value)}>
          <option value="all">All Domains</option><option>Gov</option><option>Edu</option><option>Private</option><option>Personal</option><option>Dead</option>
        </select>
        <select className="filter-select" value={fOutreach} onChange={e=>setFOutreach(e.target.value)}>
          <option value="all">All Outreach</option>{OUTREACH_OPTS.map(o=><option key={o}>{o}</option>)}
        </select>
      </div>
      <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:10}}>Showing {filtered.length} of {MEMBERS.length} suspended members, Page {page}/{totalPages}</div>
 
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table className="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Expiry</th><th>Tier</th><th>Domain</th><th>Outreach</th></tr></thead>
          <tbody>
            {paged.length===0&&<tr><td colSpan={6} style={{textAlign:'center',color:'var(--text-dim)',padding:30}}>No records found.</td></tr>}
            {paged.map(m=>{
              const os=outreach[m.id]||'Not Contacted';
              const osColor={Renewed:'var(--teal)',Contacted:'var(--blue)',Declined:'var(--red)','Not Contacted':'var(--text-dim)'};
              return(
                <tr key={m.id}>
                  <td style={{fontWeight:500}}>{m.name}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--text-mid)'}}>{m.email}</td>
                  <td style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--text-dim)'}}>{m.expiry}</td>
                  <td><span className={`badge tier-${m.tier}`}>{m.tier}</span></td>
                  <td><span className={`badge domain-${m.domain}`}>{m.domain}</span></td>
                  <td>
                    <select className="outreach-select" value={os}
                      style={{color:osColor[os]}}
                      onChange={e=>{setOutreach(prev=>({...prev,[m.id]:e.target.value}));showAlert(`${m.name.split(',')[0]} marked ${e.target.value}.`,e.target.value==='Renewed'?'success':'info');}}>
                      {OUTREACH_OPTS.map(o=><option key={o}>{o}</option>)}
                    </select>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
 
      {totalPages>1&&<div className="pagination">
        <button className="btn-ghost btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)}>‹ Prev</button>
        <span style={{fontSize:12,color:'var(--text-dim)'}}>{page} / {totalPages}</span>
        <button className="btn-ghost btn-sm" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)}>Next ›</button>
      </div>}
 
      {draftDlg&&(
        <Modal title={`Re-engagement Draft - ${draftDlg.tier} (${draftDlg.members.length} recipients)`} onClose={()=>setDraftDlg(null)} lg>
          <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
            <span className={`badge tier-${draftDlg.tier}`}>{draftDlg.tier}</span>
            <span className="badge badge-dim">{draftDlg.members.length} recipients</span>
            <span className="badge badge-dim">{draftDlg.members.filter(m=>m.domain==='Gov').length} gov domains</span>
          </div>
          <div style={{marginBottom:12,padding:'8px 12px',background:'var(--surface2)',borderRadius:6,borderLeft:'3px solid var(--gold)'}}>
            <div style={{fontSize:9,color:'var(--text-dim)',fontWeight:600,textTransform:'uppercase',marginBottom:4}}>Usage</div>
            <div style={{fontSize:12,color:'var(--text-mid)'}}>Personalize the [Name] placeholder. Export filtered CSV for email addresses. Adjust signature as needed.</div>
          </div>
          {draftDlg.loading&&<div style={{textAlign:'center',padding:'40px 0'}}><div className="loading-dots"><div className="loading-dot"/><div className="loading-dot"/><div className="loading-dot"/></div><div style={{fontSize:11,color:'var(--text-dim)',marginTop:12}}>Drafting re-engagement email…</div></div>}
          {!draftDlg.loading&&<div className="email-preview">{draftDlg.body}</div>}
          <div className="form-actions">
            <button className="btn-ghost" onClick={()=>setDraftDlg(null)}>Close</button>
            {!draftDlg.loading&&<button className="btn-primary" onClick={()=>{navigator.clipboard?.writeText(draftDlg.body);showAlert('Copied to clipboard.','success')}}>⧉ Copy Template</button>}
          </div>
        </Modal>
      )}
    </div>
  );
}
 
function App() {
  const [tab,      setTab]      = useState('overview');
  const [tasks,    setTasks]    = useState(() => load('tasks',    SEED_TASKS));
  const [outreach, setOutreach] = useState(() => load('outreach', {}));
  const [sponsors, setSponsors] = useState(() => load('sponsors', SEED_SPONSORS));
  const [actuals,  setActuals]  = useState(() => load('actuals',  {}));
  const [alert,    setAlert]    = useState(null);
 
  useEffect(() => { save('tasks',    tasks);    }, [tasks]);
  useEffect(() => { save('outreach', outreach); }, [outreach]);
  useEffect(() => { save('sponsors', sponsors); }, [sponsors]);
  useEffect(() => { save('actuals',  actuals);  }, [actuals]);
 
  const showAlert = (msg, type='success') => setAlert({ msg, type, id: Date.now() });
 
  return (
    <div className="app">
      <div className="sidebar">
        <div className="logo-block">
          <div className="logo-badge">Houston Chapter</div>
          <div className="logo-title">NFBPA<br/>Greater Houston</div>
          <div className="logo-sub">Command Dashboard v13</div>
        </div>
        <nav className="nav">
          <div className="nav-section-label">Navigation</div>
          {TABS.map(t=>(
            <div key={t.id} className={`nav-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
              <span className="nav-icon">{t.icon}</span>{t.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="org-ein">EIN: 59-2364093</div>
          <div className="org-status">⬤ 501(c)(3) Verified</div>
        </div>
      </div>
      <div className="main">
        <div className="page-header">
          <div>
            <div className="page-title">{PAGE_TITLES[tab]}</div>
            <div className="page-subtitle">NFBPA Greater Houston Chapter - FY 2026</div>
          </div>
        </div>
        {tab==='overview' && <Overview tasks={tasks} sponsors={sponsors} outreach={outreach}/>}
        {tab==='members'  && <MembersPage outreach={outreach} setOutreach={setOutreach} showAlert={showAlert}/>}
        {tab==='board'    && <BoardPage/>}
        {tab==='tasks'    && <TasksPage tasks={tasks} setTasks={setTasks} showAlert={showAlert}/>}
        {tab==='actuals'  && <ActualsPage actuals={actuals} setActuals={setActuals}/>}
        {tab==='sponsors' && <SponsorsPage sponsors={sponsors} setSponsors={setSponsors} showAlert={showAlert}/>}
        {tab==='org'      && <OrgPage/>}
      </div>
      {alert && <Toast key={alert.id} msg={alert.msg} type={alert.type} onClose={()=>setAlert(null)}/>}
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
